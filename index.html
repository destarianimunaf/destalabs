<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Illustration Portfolio — Desta Riani</title>
<meta name="description" content="Illustration portfolio by Desta Riani." />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@500&display=swap" rel="stylesheet">
<script crossorigin src="https://cdn.jsdelivr.net/npm/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://cdn.jsdelivr.net/npm/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root{--bg:#F8F6FC;--surface:#FFFFFF;--ink:#2E2B45;--ink-soft:#6B647F;--line:#E7E1F5;--lavender:#C9C3ED;--periwinkle:#A8B5E8;--mint:#BFE8D4;--blush:#F7C9CB;--butter:#FCEAB0;--accent:#7C6FD1;--up:#4FAE85;--down:#D97F86;--radius:20px;--shadow:0 8px 32px rgba(60,50,110,0.12);}
*{box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{margin:0;background:var(--bg);color:var(--ink);font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;position:relative;overflow-x:hidden;}
h1,h2,h3{font-family:'Space Grotesk',sans-serif;margin:0;letter-spacing:-0.01em;}
.mono{font-family:'IBM Plex Mono',monospace;}
a{color:inherit;}
button{font-family:inherit;cursor:pointer;}
.wrap{max-width:1120px;margin:0 auto;padding:0 20px;position:relative;z-index:1;}

/* liquid glass backdrop */
.bg-blob{position:fixed;border-radius:50%;filter:blur(95px);pointer-events:none;z-index:0;opacity:0.32;}
.bg-blob.b1{width:440px;height:440px;background:#AFC2FF;top:-140px;right:-100px;animation:floatA 19s ease-in-out infinite;}
.bg-blob.b2{width:400px;height:400px;background:#FFC2C8;top:560px;left:-160px;animation:floatB 23s ease-in-out infinite;}
.bg-blob.b3{width:360px;height:360px;background:#A8EFC9;bottom:-100px;right:8%;animation:floatC 21s ease-in-out infinite;}
.bg-blob.b4{width:300px;height:300px;background:#FFE38A;top:1150px;right:-90px;opacity:0.26;animation:floatA 17s ease-in-out infinite reverse;}
@keyframes floatA{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(35px,45px) scale(1.08);}}
@keyframes floatB{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(-45px,30px) scale(1.05);}}
@keyframes floatC{0%,100%{transform:translate(0,0) scale(1);}50%{transform:translate(25px,-35px) scale(1.1);}}
@media(prefers-reduced-motion:reduce){.bg-blob{animation:none !important;}}

.glass{background:rgba(255,255,255,0.78);-webkit-backdrop-filter:blur(18px) saturate(160%);backdrop-filter:blur(18px) saturate(160%);border:1px solid rgba(255,255,255,0.9);box-shadow:var(--shadow), inset 0 1px 0 rgba(255,255,255,0.8);}

.nav{position:sticky;top:0;z-index:40;background:rgba(255,255,255,0.78);-webkit-backdrop-filter:blur(16px) saturate(160%);backdrop-filter:blur(16px) saturate(160%);border-bottom:1px solid rgba(255,255,255,0.7);}
.nav-inner{position:relative;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;max-width:1120px;margin:0 auto;}
.brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1rem;}
.brand-mark{width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,var(--periwinkle),var(--blush));display:flex;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif;color:#fff;font-size:0.8rem;font-weight:700;flex-shrink:0;}
.nav-links{display:flex;align-items:center;gap:24px;font-size:0.9rem;font-weight:500;}
.nav-links a{text-decoration:none;color:var(--ink-soft);transition:color .15s;}
.nav-links a:hover{color:var(--ink);}
.nav-toggle{display:none;background:none;border:none;font-size:1.3rem;color:var(--ink);padding:6px;}
.btn{border:none;border-radius:999px;padding:10px 18px;font-weight:600;font-size:0.86rem;transition:transform .15s,box-shadow .15s;}
.btn:focus-visible,a:focus-visible,input:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}
.btn-primary{background:var(--accent);color:#fff;box-shadow:inset 0 1px 0 rgba(255,255,255,0.35);}
.btn-primary:hover{transform:translateY(-1px);box-shadow:0 6px 16px rgba(124,111,209,0.35), inset 0 1px 0 rgba(255,255,255,0.35);}
.btn-ghost{background:rgba(255,255,255,0.55);color:var(--ink);border:1px solid rgba(255,255,255,0.8);-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);}
.btn-ghost:hover{border-color:var(--accent);}
.btn-small{padding:7px 13px;font-size:0.78rem;}
.btn-danger{background:rgba(247,201,203,0.7);color:#7A2E33;}
.hero{padding:56px 0 36px;}
.hero-grid{display:grid;grid-template-columns:1.1fr 0.9fr;gap:40px;align-items:center;}
.eyebrow{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,0.6);border:1px solid rgba(255,255,255,0.8);padding:6px 14px;border-radius:999px;font-size:0.76rem;font-weight:600;color:var(--ink-soft);margin-bottom:18px;-webkit-backdrop-filter:blur(10px);backdrop-filter:blur(10px);}
.eyebrow .dot{width:7px;height:7px;border-radius:50%;background:var(--mint);flex-shrink:0;}
.hero h1{font-size:clamp(1.8rem,4.5vw,3.1rem);line-height:1.14;}
.hero h1 span{color:var(--accent);}
.hero p.lead{color:var(--ink-soft);font-size:1rem;line-height:1.6;max-width:46ch;margin:18px 0 26px;}
.hero-cta{display:flex;gap:12px;flex-wrap:wrap;}
.hero-art{position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;padding:28px;border-radius:28px;}
.hero-art::after{content:"";position:absolute;top:-60%;left:-60%;width:60%;height:220%;background:linear-gradient(120deg,transparent,rgba(255,255,255,0.65),transparent);transform:rotate(18deg);animation:sheen 7s ease-in-out infinite;}
@keyframes sheen{0%{left:-60%;}45%{left:130%;}100%{left:130%;}}
@media(prefers-reduced-motion:reduce){.hero-art::after{animation:none;display:none;}}
.hero-art svg{width:100%;max-width:360px;height:auto;}
.ticker-section{border-top:1px solid rgba(255,255,255,0.7);border-bottom:1px solid rgba(255,255,255,0.7);background:rgba(255,255,255,0.7);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);}
.ticker-mask{overflow:hidden;padding:12px 0;}
.ticker-track{display:flex;width:max-content;animation:scroll 28s linear infinite;}
@media(prefers-reduced-motion:reduce){.ticker-track{animation:none;overflow-x:auto;}}
.ticker-item{display:flex;align-items:center;gap:7px;padding:0 20px;border-right:1px solid var(--line);font-family:'IBM Plex Mono',monospace;font-size:0.78rem;white-space:nowrap;}
.ticker-item .up{color:var(--up);}
.ticker-item .down{color:var(--down);}
@keyframes scroll{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.section{padding:52px 0;position:relative;z-index:1;}
.section-head{margin-bottom:28px;}
.section-head h2{font-size:clamp(1.4rem,2.6vw,2rem);}
.section-sub{color:var(--ink-soft);font-size:0.92rem;margin-top:6px;}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px;}
.card{border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column;transition:transform .2s;}
.card:hover{transform:translateY(-3px);}
.card-media{aspect-ratio:4/3;width:100%;object-fit:cover;display:block;background:#eee;}
.card-media,.card-media-placeholder svg{transition:transform .5s ease;}
.card:hover .card-media,.card:hover .card-media-placeholder svg{transform:scale(1.06);}
.card-media-placeholder{aspect-ratio:4/3;width:100%;overflow:hidden;display:block;}
.card-media-placeholder svg{width:100%;height:100%;display:block;}
.card-body{padding:15px 16px 16px;display:flex;flex-direction:column;gap:8px;flex:1;}
.card-body h3{font-size:1rem;}
.card-tags{display:flex;gap:6px;flex-wrap:wrap;}
.tag{background:rgba(255,255,255,0.6);border:1px solid var(--line);border-radius:999px;padding:3px 10px;font-size:0.7rem;color:var(--ink-soft);}
.card-actions{display:flex;gap:8px;margin-top:auto;padding-top:8px;}
.empty-state{grid-column:1/-1;text-align:center;padding:48px 20px;border:1.5px dashed rgba(255,255,255,0.8);border-radius:var(--radius);color:var(--ink-soft);}
.drive-embed-wrap{border-radius:var(--radius);overflow:hidden;margin-top:22px;}
.drive-embed-wrap iframe{width:100%;height:520px;border:0;display:block;}
.drive-embed-label{font-size:0.8rem;color:var(--ink-soft);margin-bottom:10px;}
.admin-panel{border-radius:var(--radius);padding:24px;}
.field{margin-bottom:15px;}
.field label{display:block;font-size:0.8rem;font-weight:600;margin-bottom:6px;}
.field input{width:100%;padding:10px 12px;border-radius:10px;border:1px solid var(--line);font-family:inherit;font-size:0.9rem;background:rgba(255,255,255,0.7);}
.field small{color:var(--ink-soft);font-size:0.74rem;}
.form-row{display:flex;gap:10px;margin-top:18px;}
.badge-admin{background:rgba(191,232,212,0.8);color:#1F5C43;padding:5px 12px;border-radius:999px;font-size:0.74rem;font-weight:700;display:inline-block;margin-bottom:16px;}
.item-manage-row{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:10px 0;border-bottom:1px solid var(--line);font-size:0.86rem;}
.item-manage-row:last-child{border-bottom:none;}
.admin-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
.login-wrap{max-width:420px;}
.about-grid{display:grid;grid-template-columns:0.8fr 1.2fr;gap:36px;align-items:center;}
.about-card{border-radius:var(--radius);padding:24px;}
.stat-row{display:flex;gap:22px;margin-top:16px;flex-wrap:wrap;}
.stat b{display:block;font-family:'Space Grotesk',sans-serif;font-size:1.3rem;}
.stat span{font-size:0.76rem;color:var(--ink-soft);}
.bio-card{border-radius:var(--radius);padding:24px;}
footer{border-top:1px solid rgba(255,255,255,0.7);padding:32px 0;color:var(--ink-soft);font-size:0.84rem;background:rgba(255,255,255,0.6);-webkit-backdrop-filter:blur(14px);backdrop-filter:blur(14px);position:relative;z-index:1;}
.footer-inner{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.footer-inner a{text-decoration:none;font-weight:600;color:var(--accent);}
.footer-credit{font-size:0.78rem;opacity:0.85;}
@media(max-width:860px){
.hero-grid,.about-grid{grid-template-columns:1fr;}
.hero-art{order:-1;}
.grid{grid-template-columns:repeat(2,1fr);}
.nav-toggle{display:block;}
.nav-links{display:none;position:absolute;top:56px;left:0;right:0;flex-direction:column;align-items:flex-start;gap:14px;background:rgba(255,255,255,0.85);-webkit-backdrop-filter:blur(16px);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.6);padding:18px 20px;box-shadow:var(--shadow);}
.nav-links.open{display:flex;}
.admin-grid{grid-template-columns:1fr;}
.drive-embed-wrap iframe{height:420px;}
}
@media(max-width:540px){
.grid{grid-template-columns:1fr;}
.hero{padding:40px 0 28px;}
.section{padding:40px 0;}
.drive-embed-wrap iframe{height:360px;}
.bg-blob{opacity:0.22;}
}
</style>
</head>
<body>
<div class="bg-blob b1"></div>
<div class="bg-blob b2"></div>
<div class="bg-blob b3"></div>
<div class="bg-blob b4"></div>
<div id="root"></div>
<script>
var h = React.createElement;

var INSTAGRAM_URL = "https://instagram.com/destarianimunaf";
var GITHUB_URL = "https://github.com/destarianimunaf";
var ADMIN_PASSCODE = "changeme123";
var DRIVE_FOLDER_ID = "1ZcH24TTfnV39kNLNp00V0ATDERa1iV4M";

var SKILLS = [
  {sym:"REACT",label:"Frontend",trend:"up",change:"+2.4%"},
  {sym:"ILLUS",label:"Illustration",trend:"up",change:"+1.1%"},
  {sym:"UI/UX",label:"Product design",trend:"flat",change:"0.0%"},
  {sym:"JS",label:"JavaScript",trend:"up",change:"+3.0%"},
  {sym:"IDX",label:"Market watch",trend:"up",change:"+0.8%"},
  {sym:"GIT",label:"Version control",trend:"flat",change:"0.0%"},
  {sym:"FIGMA",label:"Prototyping",trend:"up",change:"+1.6%"}
];

var INITIAL_PORTFOLIO = [
  {id:1,title:"Illustration I",tags:["Illustration"],image:"https://drive.google.com/uc?export=view&id=1OXTlKpP8r_Jy6T7Vtb_m6lU3vIn27FFB"},
  {id:2,title:"Illustration II",tags:["Illustration"],image:"https://drive.google.com/uc?export=view&id=18nWVWSZpbualJwmwxvtWfTSmN4x0ifrd"},
  {id:3,title:"Illustration III",tags:["Illustration"],image:"https://drive.google.com/uc?export=view&id=1-3CwrrZhpsOtj9_NBe4pBGo1vmd9fg2C"}
];

function normalizeDriveUrl(u){
  if(!u) return "";
  var m1 = u.match(/drive\.google\.com\/file\/d\/([^/]+)/);
  if(m1) return "https://drive.google.com/uc?export=view&id=" + m1[1];
  var m2 = u.match(/[?&]id=([^&]+)/);
  if(m2 && u.indexOf("drive.google.com") !== -1) return "https://drive.google.com/uc?export=view&id=" + m2[1];
  return u;
}

function HeroArt(){
  return h("svg",{viewBox:"0 0 400 340",fill:"none",xmlns:"http://www.w3.org/2000/svg"},
    h("circle",{cx:200,cy:170,r:150,fill:"rgba(255,255,255,0.5)"}),
    h("circle",{cx:300,cy:80,r:34,fill:"#F7C9CB",opacity:0.9}),
    h("circle",{cx:70,cy:250,r:26,fill:"#BFE8D4",opacity:0.9}),
    h("rect",{x:90,y:130,width:220,height:140,rx:14,fill:"rgba(255,255,255,0.7)",stroke:"#E7E1F5",strokeWidth:2}),
    h("rect",{x:90,y:130,width:220,height:26,rx:14,fill:"#C9C3ED"}),
    h("circle",{cx:104,cy:143,r:4,fill:"#fff"}),
    h("circle",{cx:116,cy:143,r:4,fill:"#fff"}),
    h("circle",{cx:128,cy:143,r:4,fill:"#fff"}),
    h("polyline",{points:"112,240 150,200 178,222 214,168 250,190 288,150",fill:"none",stroke:"#7C6FD1",strokeWidth:4,strokeLinecap:"round",strokeLinejoin:"round"}),
    h("circle",{cx:288,cy:150,r:6,fill:"#4FAE85"}),
    h("circle",{cx:214,cy:168,r:5,fill:"#7C6FD1"}),
    h("path",{d:"M150 260 L170 232 L190 260 Z",fill:"#FCEAB0"}),
    h("rect",{x:60,y:260,width:60,height:10,rx:5,fill:"#F7C9CB"})
  );
}

function Ticker(){
  var items = SKILLS.concat(SKILLS);
  return h("div",{className:"ticker-section"},
    h("div",{className:"ticker-mask"},
      h("div",{className:"ticker-track"},
        items.map(function(s,i){
          var arrow = s.trend==="up" ? "▲" : s.trend==="down" ? "▼" : "—";
          var cls = s.trend==="up" ? "up" : s.trend==="down" ? "down" : "";
          return h("div",{className:"ticker-item",key:i},
            h("span",{style:{fontWeight:600}},s.sym),
            h("span",null,s.label),
            h("span",{className:cls},arrow + " " + s.change)
          );
        })
      )
    )
  );
}

function ArtMarket(props){
  var uid = "m" + props.uid;
  return h("svg",{viewBox:"0 0 400 300",preserveAspectRatio:"xMidYMid slice",xmlns:"http://www.w3.org/2000/svg"},
    h("defs",null, h("linearGradient",{id:"grad"+uid,x1:"0",y1:"0",x2:"1",y2:"1"}, h("stop",{offset:"0%",stopColor:"#C9C3ED"}), h("stop",{offset:"100%",stopColor:"#A8B5E8"}))),
    h("rect",{width:400,height:300,fill:"url(#grad"+uid+")"}),
    h("rect",{x:70,y:190,width:30,height:70,rx:6,fill:"#FFFFFF",opacity:0.85}),
    h("rect",{x:120,y:150,width:30,height:110,rx:6,fill:"#FFFFFF",opacity:0.85}),
    h("rect",{x:170,y:170,width:30,height:90,rx:6,fill:"#FFFFFF",opacity:0.9}),
    h("rect",{x:220,y:110,width:30,height:150,rx:6,fill:"#FFFFFF",opacity:0.95}),
    h("rect",{x:270,y:80,width:30,height:180,rx:6,fill:"#FFFFFF"}),
    h("polyline",{points:"85,185 135,145 185,165 235,105 285,75",fill:"none",stroke:"#4FAE85",strokeWidth:4,strokeLinecap:"round",strokeLinejoin:"round"}),
    h("path",{d:"M275 75 L295 75 L295 95",fill:"none",stroke:"#4FAE85",strokeWidth:4,strokeLinecap:"round",strokeLinejoin:"round"}),
    h("circle",{cx:335,cy:55,r:22,fill:"#FCEAB0",opacity:0.9})
  );
}
function ArtCode(props){
  var uid = "c" + props.uid;
  return h("svg",{viewBox:"0 0 400 300",preserveAspectRatio:"xMidYMid slice",xmlns:"http://www.w3.org/2000/svg"},
    h("defs",null, h("linearGradient",{id:"grad"+uid,x1:"0",y1:"0",x2:"1",y2:"1"}, h("stop",{offset:"0%",stopColor:"#F7C9CB"}), h("stop",{offset:"100%",stopColor:"#FCEAB0"}))),
    h("rect",{width:400,height:300,fill:"url(#grad"+uid+")"}),
    h("rect",{x:60,y:55,width:280,height:190,rx:16,fill:"#FFFFFF",opacity:0.92}),
    h("rect",{x:60,y:55,width:280,height:34,rx:16,fill:"#7C6FD1",opacity:0.9}),
    h("circle",{cx:78,cy:72,r:5,fill:"#fff"}),
    h("circle",{cx:94,cy:72,r:5,fill:"#fff"}),
    h("circle",{cx:110,cy:72,r:5,fill:"#fff"}),
    h("path",{d:"M115 150 L90 175 L115 200",fill:"none",stroke:"#7C6FD1",strokeWidth:7,strokeLinecap:"round",strokeLinejoin:"round"}),
    h("path",{d:"M225 150 L250 175 L225 200",fill:"none",stroke:"#7C6FD1",strokeWidth:7,strokeLinecap:"round",strokeLinejoin:"round"}),
    h("line",{x1:195,y1:140,x2:175,y2:210,stroke:"#4FAE85",strokeWidth:7,strokeLinecap:"round"})
  );
}
function ArtPalette(props){
  var uid = "p" + props.uid;
  return h("svg",{viewBox:"0 0 400 300",preserveAspectRatio:"xMidYMid slice",xmlns:"http://www.w3.org/2000/svg"},
    h("defs",null, h("linearGradient",{id:"grad"+uid,x1:"0",y1:"0",x2:"1",y2:"1"}, h("stop",{offset:"0%",stopColor:"#BFE8D4"}), h("stop",{offset:"100%",stopColor:"#A8B5E8"}))),
    h("rect",{width:400,height:300,fill:"url(#grad"+uid+")"}),
    h("ellipse",{cx:190,cy:160,rx:115,ry:82,fill:"#FFFFFF",opacity:0.92}),
    h("ellipse",{cx:250,cy:160,rx:26,ry:20,fill:"url(#grad"+uid+")"}),
    h("circle",{cx:140,cy:120,r:14,fill:"#F7C9CB"}),
    h("circle",{cx:182,cy:104,r:14,fill:"#FCEAB0"}),
    h("circle",{cx:224,cy:112,r:14,fill:"#BFE8D4"}),
    h("circle",{cx:140,cy:192,r:14,fill:"#A8B5E8"}),
    h("circle",{cx:178,cy:208,r:14,fill:"#C9C3ED"}),
    h("path",{d:"M300 90 L344 46",stroke:"#7C6FD1",strokeWidth:11,strokeLinecap:"round"}),
    h("path",{d:"M340 42 L358 24 L368 34 L350 52 Z",fill:"#7C6FD1"})
  );
}
var PLACEHOLDER_ARTS = [ArtMarket, ArtCode, ArtPalette];

function CardMedia(props){
  var item = props.item, index = props.index;
  var state = React.useState(false), broken = state[0], setBroken = state[1];
  if(!item.image || broken){
    var Art = PLACEHOLDER_ARTS[index % PLACEHOLDER_ARTS.length];
    return h("div",{className:"card-media-placeholder"}, h(Art,{uid:item.id}));
  }
  return h("img",{className:"card-media",src:item.image,alt:item.title,loading:"lazy",onError:function(){setBroken(true);}});
}

function PortfolioCard(props){
  var item = props.item, index = props.index, isAdmin = props.isAdmin, onEdit = props.onEdit, onDelete = props.onDelete;
  return h("div",{className:"card glass"},
    h(CardMedia,{item:item,index:index}),
    h("div",{className:"card-body"},
      h("h3",null,item.title),
      h("div",{className:"card-tags"}, item.tags.map(function(t){ return h("span",{className:"tag",key:t}, t); })),
      isAdmin && h("div",{className:"card-actions"},
        h("button",{className:"btn btn-ghost btn-small",onClick:function(){onEdit(item);}},"Edit"),
        h("button",{className:"btn btn-danger btn-small",onClick:function(){onDelete(item.id);}},"Delete")
      )
    )
  );
}

function AdminForm(props){
  var draft = props.draft, setDraft = props.setDraft, onSubmit = props.onSubmit, onCancel = props.onCancel;
  return h("form",{className:"admin-panel glass",onSubmit:function(e){ e.preventDefault(); onSubmit(); }},
    h("span",{className:"badge-admin"},"Admin mode"),
    h("div",{className:"field"},
      h("label",{htmlFor:"title"},"Title"),
      h("input",{id:"title",required:true,value:draft.title,onChange:function(e){setDraft(Object.assign({},draft,{title:e.target.value}));},placeholder:"e.g. Rooftop Series No. 3"})
    ),
    h("div",{className:"field"},
      h("label",{htmlFor:"tags"},"Tags (comma separated)"),
      h("input",{id:"tags",value:draft.tagsInput,onChange:function(e){setDraft(Object.assign({},draft,{tagsInput:e.target.value}));},placeholder:"Illustration, Digital"})
    ),
    h("div",{className:"field"},
      h("label",{htmlFor:"image"},"Google Drive image link"),
      h("input",{id:"image",value:draft.image,onChange:function(e){setDraft(Object.assign({},draft,{image:e.target.value}));},placeholder:"https://drive.google.com/file/d/.../view"}),
      h("small",null,'Set sharing to "Anyone with the link" — the link is converted automatically.')
    ),
    h("div",{className:"form-row"},
      h("button",{type:"submit",className:"btn btn-primary"}, draft.id ? "Save changes" : "Add to portfolio"),
      draft.id && h("button",{type:"button",className:"btn btn-ghost",onClick:onCancel},"Cancel")
    )
  );
}

function LoginForm(props){
  var onLogin = props.onLogin, error = props.error;
  var state = React.useState(""), pass = state[0], setPass = state[1];
  return h("form",{className:"admin-panel glass login-wrap",onSubmit:function(e){ e.preventDefault(); onLogin(pass); }},
    h("div",{className:"field"},
      h("label",{htmlFor:"passcode"},"Admin passcode"),
      h("input",{id:"passcode",type:"password",value:pass,onChange:function(e){setPass(e.target.value);},placeholder:"Enter passcode"}),
      error && h("small",{style:{color:"#D97F86"}},"Incorrect passcode. Try again.")
    ),
    h("button",{type:"submit",className:"btn btn-primary"},"Log in")
  );
}

function Nav(){
  var state = React.useState(false), open = state[0], setOpen = state[1];
  return h("nav",{className:"nav"},
    h("div",{className:"nav-inner"},
      h("div",{className:"brand"}, h("span",{className:"brand-mark"},"DR"), "Desta Riani"),
      h("button",{className:"nav-toggle","aria-label":"Toggle menu",onClick:function(){setOpen(!open);}}, open ? "✕" : "☰"),
      h("div",{className:"nav-links" + (open?" open":"")},
        h("a",{href:"#work",onClick:function(){setOpen(false);}},"Work"),
        h("a",{href:"#about",onClick:function(){setOpen(false);}},"About"),
        h("a",{href:"#admin",onClick:function(){setOpen(false);}},"Admin"),
        h("a",{href:INSTAGRAM_URL,target:"_blank",rel:"noopener noreferrer"},"Instagram")
      )
    )
  );
}

function App(){
  var itemsState = React.useState(INITIAL_PORTFOLIO), items = itemsState[0], setItems = itemsState[1];
  var adminState = React.useState(false), isAdmin = adminState[0], setIsAdmin = adminState[1];
  var errState = React.useState(false), loginError = errState[0], setLoginError = errState[1];
  var draftState = React.useState({id:null,title:"",tagsInput:"",image:""}), draft = draftState[0], setDraft = draftState[1];

  function nextId(){ return items.length ? Math.max.apply(null, items.map(function(i){return i.id;})) + 1 : 1; }
  function handleLogin(pass){ if(pass === ADMIN_PASSCODE){ setIsAdmin(true); setLoginError(false);} else setLoginError(true); }
  function resetDraft(){ setDraft({id:null,title:"",tagsInput:"",image:""}); }
  function handleSubmit(){
    var tags = draft.tagsInput.split(",").map(function(t){return t.trim();}).filter(Boolean);
    var image = normalizeDriveUrl(draft.image.trim());
    if(draft.id){
      setItems(items.map(function(it){ return it.id === draft.id ? Object.assign({},it,{title:draft.title,tags:tags,image:image}) : it; }));
    } else {
      setItems([{id:nextId(),title:draft.title,tags:tags,image:image}].concat(items));
    }
    resetDraft();
  }
  function handleEdit(item){
    setDraft({id:item.id,title:item.title,tagsInput:item.tags.join(", "),image:item.image});
    var el = document.getElementById("admin");
    if(el) el.scrollIntoView({behavior:"smooth"});
  }
  function handleDelete(id){
    setItems(items.filter(function(it){return it.id !== id;}));
    if(draft.id === id) resetDraft();
  }

  return h(React.Fragment,null,
    h(Nav,null),
    h("header",{className:"hero"},
      h("div",{className:"wrap hero-grid"},
        h("div",null,
          h("div",{className:"eyebrow"}, h("span",{className:"dot"}), " Computer Science & Management · Illustrator · Market learner"),
          h("h1",null,"Illustration built with the same discipline as ", h("span",null,"clean code"),"."),
          h("p",{className:"lead"},"I split my time between technology, markets, and drawing — with a habit of reading charts the way most people scroll social media. This is where the illustration work lives."),
          h("div",{className:"hero-cta"},
            h("a",{className:"btn btn-primary",href:"#work"},"View portfolio"),
            h("a",{className:"btn btn-ghost",href:INSTAGRAM_URL,target:"_blank",rel:"noopener noreferrer"},"Follow on Instagram")
          )
        ),
        h("div",{className:"hero-art glass"}, h(HeroArt,null))
      )
    ),
    h(Ticker,null),
    h("section",{className:"section",id:"work"},
      h("div",{className:"wrap"},
        h("div",{className:"section-head"},
          h("h2",null,"Portfolio"),
          h("p",{className:"section-sub"},"Illustrations loaded directly from Google Drive.")
        ),
        h("div",{className:"grid"},
          items.length === 0 && h("div",{className:"empty-state"},"No pieces yet — log in below and add the first one."),
          items.map(function(item,i){
            return h(PortfolioCard,{key:item.id,item:item,index:i,isAdmin:isAdmin,onEdit:handleEdit,onDelete:handleDelete});
          })
        ),
        h("p",{className:"drive-embed-label"},"Full folder, live from Google Drive:"),
        h("div",{className:"drive-embed-wrap glass"},
          h("iframe",{src:"https://drive.google.com/embeddedfolderview?id="+DRIVE_FOLDER_ID+"#grid",loading:"lazy",title:"Illustration folder on Google Drive"})
        )
      )
    ),
    h("section",{className:"section",id:"about"},
      h("div",{className:"wrap about-grid"},
        h("div",{className:"about-card glass"},
          h("h2",{style:{fontSize:"1.25rem"}},"About"),
          h("p",{style:{color:"var(--ink-soft)",marginTop:"10px",lineHeight:1.6}},"By habit, a slow, steady market learner — more index-and-patience than day-trading. By training, someone who likes taking things apart, whether it's a codebase or a chart."),
          h("div",{className:"stat-row"},
            h("div",{className:"stat"}, h("b",null,items.length), h("span",null,"Pieces published")),
            h("div",{className:"stat"}, h("b",null,SKILLS.length), h("span",null,"Active skills")),
            h("div",{className:"stat"}, h("b",null,"2"), h("span",null,"Worlds — markets & ink"))
          )
        ),
        h("div",{className:"bio-card glass"},
          h("h3",{style:{fontSize:"1.05rem",marginBottom:"10px"}},"Desta Riani"),
          h("p",{style:{color:"var(--ink-soft)",lineHeight:1.6}},"Background in Computer Science and Management, with a steady interest in technology and the stock market. Illustration sits alongside both — a slower, quieter way of thinking through ideas, sketch by sketch, the same patient way a good position gets built.")
        )
      )
    ),
    h("section",{className:"section",id:"admin"},
      h("div",{className:"wrap"},
        h("div",{className:"section-head"},
          h("h2",null,"Admin"),
          h("p",{className:"section-sub"},"Optional — log in if you ever want to manually add or adjust a piece.")
        ),
        !isAdmin
          ? h(LoginForm,{onLogin:handleLogin,error:loginError})
          : h("div",{className:"admin-grid"},
              h(AdminForm,{draft:draft,setDraft:setDraft,onSubmit:handleSubmit,onCancel:resetDraft}),
              h("div",{className:"admin-panel glass"},
                h("span",{className:"badge-admin"},"Manage pieces"),
                items.map(function(item){
                  return h("div",{className:"item-manage-row",key:item.id},
                    h("span",null,item.title),
                    h("div",{style:{display:"flex",gap:"8px"}},
                      h("button",{className:"btn btn-ghost btn-small",onClick:function(){handleEdit(item);}},"Edit"),
                      h("button",{className:"btn btn-danger btn-small",onClick:function(){handleDelete(item.id);}},"Delete")
                    )
                  );
                }),
                h("div",{style:{marginTop:"16px"}}, h("button",{className:"btn btn-ghost btn-small",onClick:function(){setIsAdmin(false);}},"Log out"))
              )
            )
      )
    ),
    h("footer",null,
      h("div",{className:"wrap footer-inner"},
        h("span",{className:"footer-credit"},"Made by Desta Riani"),
        h("span",null,
          h("a",{href:INSTAGRAM_URL,target:"_blank",rel:"noopener noreferrer"},"Instagram"),
          " · ",
          h("a",{href:GITHUB_URL,target:"_blank",rel:"noopener noreferrer"},"GitHub")
        )
      )
    )
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(h(App,null));
</script>
</body>
</html>
